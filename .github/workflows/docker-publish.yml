---
name: Build and Push Docker Image
on:
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long
            type=ref,event=branch
            latest
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Setup Nginx Reverse Proxy
        run: |
          # Create an Nginx config template with quotes for the environment variables
          cat <<'EOF' > nginx.conf.template
          events {}
          http {
            server {
              listen 80;
              location / {
                proxy_pass https://nomad.mackhaymond.co;
                proxy_set_header Host nomad.mackhaymond.co;
                proxy_set_header CF-Access-Client-Id "${{ secrets.CLOUDFLARE_AUTH_CLIENT_ID }}";
                proxy_set_header CF-Access-Client-Secret "${{ secrets.CLOUDFLARE_AUTH_CLIENT_SECRET }}";
                proxy_ssl_server_name on;
                proxy_ssl_verify off;
              }
            }
          }
          EOF

          # Substitute environment variables into the config template
          envsubst < nginx.conf.template > nginx.conf

          # Optionally, output the config for debugging (remove or mask secrets if necessary)
          cat nginx.conf

          # Start the Nginx proxy container (container port 80 is mapped to host port 8080)
          docker run -d --rm --name nginx-proxy -p 8080:80 \
            -v "$(pwd)/nginx.conf:/etc/nginx/nginx.conf:ro" \
            nginx:stable
      - name: Setup `nomad`
        uses: hashicorp/setup-nomad@main
        id: setup
        with:
          version: latest
      - name: Run Nomad Job
        run: |-
          nomad job run nomad_jobspec.hcl
        env:
          NOMAD_ADDR: https://nomad.mackhaymond.co
