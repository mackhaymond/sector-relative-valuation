---
name: Update Sector Analysis Data
on:
  workflow_dispatch:
  schedule:
    # Monthly at 03:00 UTC on the 1st. yfinance fundamentals are revised
    # on earnings cadence (quarterly) so a monthly refresh keeps the
    # dashboard in sync with the underlying data without burning CI
    # budget on no-op runs.
    - cron: '0 3 1 * *'
permissions:
  contents: write
jobs:
  run-and-commit:
    runs-on: ubuntu-latest
    env:
      # Force unbuffered stdout/stderr so the per-sector / per-company
      # progress lines emitted by src/data.py appear in real time in the
      # Actions log rather than at job end. Combined with `python -u`
      # below this gives belt-and-suspenders coverage against any
      # buffering layer that re-emerges.
      PYTHONUNBUFFERED: "1"
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
          token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: uv sync --frozen

    - name: Run data.py
      run: uv run python -u src/data.py

    - name: Run generate_weights.py
      run: uv run python -u src/generate_weights.py

    - name: Move CSVs into ./public/ (Worker asset directory)
      run: |
        mkdir -p public
        mv -f sector_analysis.csv sector_analysis_full.csv weights.csv public/

    - name: Verify all 11 sectors are present in weights.csv
      run: |
        SECTOR_COUNT=$(tail -n +2 public/weights.csv | wc -l | tr -d ' ')
        if [ "$SECTOR_COUNT" -lt 11 ]; then
          echo "::error::public/weights.csv has $SECTOR_COUNT sectors (expected 11)."
          echo "Sectors present:"
          cut -d, -f1 public/weights.csv | tail -n +2
          exit 1
        fi
        echo "All $SECTOR_COUNT sectors present in public/weights.csv."

    - name: Commit changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add public/sector_analysis.csv public/sector_analysis_full.csv public/weights.csv
        if git diff --cached --quiet; then
          echo "No data changes to commit; skipping push."
        else
          git commit -m 'data: monthly refresh of sector analysis CSVs'
          git push
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
