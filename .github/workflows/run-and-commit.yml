---
name: Update Sector Analysis Data
on:
  workflow_dispatch:
  # schedule:
    # - cron: 0 3 */2 * *
permissions:
  contents: write
jobs:
  run-and-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
          token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: uv sync --frozen

    - name: Run data.py
      run: uv run python src/data.py

    - name: Run generate_weights.py
      run: uv run python src/generate_weights.py

    - name: Move CSVs into ./public/ (Worker asset directory)
      run: |
        mkdir -p public
        mv -f sector_analysis.csv sector_analysis_full.csv weights.csv public/

    - name: Verify all 11 sectors are present in weights.csv
      run: |
        SECTOR_COUNT=$(tail -n +2 public/weights.csv | wc -l | tr -d ' ')
        if [ "$SECTOR_COUNT" -lt 11 ]; then
          echo "::error::public/weights.csv has $SECTOR_COUNT sectors (expected 11)."
          echo "Sectors present:"
          cut -d, -f1 public/weights.csv | tail -n +2
          exit 1
        fi
        echo "All $SECTOR_COUNT sectors present in public/weights.csv."

    - name: Commit changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add public/sector_analysis.csv public/sector_analysis_full.csv public/weights.csv
        git commit -m 'Update sector analysis data'
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
