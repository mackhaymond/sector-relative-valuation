---
name: Update Sector Analysis Data
on:
  workflow_dispatch:
  # schedule:
    # - cron: 0 3 */2 * *
permissions:
  contents: write
jobs:
  run-and-commit:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
          token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: uv sync --frozen

    - name: Run data.py
      run: uv run python src/data.py

    - name: Run generate_weights.py
      run: uv run python src/generate_weights.py

    - name: Commit changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add sector_analysis.csv sector_analysis_full.csv weights.csv
        git commit -m 'Update sector analysis data'
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
