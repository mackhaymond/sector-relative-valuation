name: test connect
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test requests
        run: |
          curl --location \
            -H "CF-Access-Client-Id: ${{ secrets.CLOUDFLARE_AUTH_CLIENT_ID }}" \
            -H "CF-Access-Client-Secret: ${{ secrets.CLOUDFLARE_AUTH_CLIENT_SECRET }}" \
            https://nomad.mackhaymond.co

      - name: Setup Nginx Reverse Proxy
        run: |
          # Create an Nginx config template (using placeholder variables)
          cat <<'EOF' > nginx.conf.template
          events {}
          http {
            server {
              listen 80;
              location / {
                proxy_pass https://nomad.mackhaymond.co;
                proxy_set_header Host nomad.mackhaymond.co;
                proxy_set_header CF-Access-Client-Id ${CLIENT_ID};
                proxy_set_header CF-Access-Client-Secret ${CLIENT_SECRET};
                proxy_ssl_server_name on;
                proxy_ssl_verify off;
              }
            }
          }
          EOF

          # Replace placeholders with environment variable values
          envsubst < nginx.conf.template > nginx.conf

          # Start the Nginx container with port mapping (80 in container -> 8080 on host)
          docker run -d --rm --name nginx-proxy -p 8080:80 \
            -e CLIENT_ID="${{ secrets.CLOUDFLARE_AUTH_CLIENT_ID }}" \
            -e CLIENT_SECRET="${{ secrets.CLOUDFLARE_AUTH_CLIENT_SECRET }}" \
            -v "$(pwd)/nginx.conf:/etc/nginx/nginx.conf:ro" \
            nginx:stable

      - name: Wait for proxy to start
        run: sleep 5

      - name: Test the Proxy Endpoint
        run: curl -v http://127.0.0.1:8080

      - name: Setup `nomad`
        uses: hashicorp/setup-nomad@main
        with:
          version: latest

      - name: Run Nomad Job
        env:
          # Use the IPv4 loopback address explicitly
          NOMAD_ADDR: http://127.0.0.1:8080
        run: |
          nomad job run nomad_jobspec.hcl
